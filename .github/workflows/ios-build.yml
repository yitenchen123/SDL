name: Build SDL3 for iOS

# 构建 iOS arm64 版 libSDL3.dylib，供 PojavLauncher (Amethyst iOS) 集成使用。
# LWJGL 的 Library.loadNative 期望加载动态库，iOS 支持嵌入动态库。
#
# 产物命名约定（macOS dylib 标准）：
# - libSDL3.0.dylib：真实库文件（含 LC_ID_DYLIB=@rpath/libSDL3.0.dylib）
# - libSDL3.dylib：符号链接 → libSDL3.0.dylib（LWJGL 默认查找名）

on:
  push:
    branches: [ main, build-ios ]
    paths:
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (Release/Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-ios:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout SDL3
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 15.4
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      - name: Verify iOS SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios

      - name: Configure CMake (iOS arm64)
        run: |
          mkdir -p build-ios
          cmake -B build-ios -S . \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }} \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST=OFF \
            -DSDL_MAIN_HANDLED=ON \
            -DSDL_RENDER=ON \
            -DSDL_VIDEO=ON \
            -DSDL_AUDIO=ON \
            -DSDL_EVENTS=ON \
            -DSDL_JOYSTICK=ON \
            -DSDL_HAPTIC=ON \
            -DSDL_SENSOR=ON \
            -DSDL_POWER=ON \
            -DSDL_THREADS=ON \
            -DSDL_TIMERS=ON \
            -DSDL_FILE=ON \
            -DSDL_LOADSO=ON \
            -DSDL_CPUINFO=ON \
            -DSDL_FILESYSTEM=ON \
            -DSDL_LOCALE=ON \
            -DSDL_MISC=ON \
            -DSDL_OPENGL=OFF \
            -DSDL_OPENGLES=ON \
            -DSDL_VULKAN=OFF \
            -DSDL_METAL=ON

      - name: Build libSDL3.dylib
        run: cmake --build build-ios --config ${{ github.event.inputs.build_type || 'Release' }} --parallel 4 --verbose

      - name: Install dylib to staged directory
        run: |
          # 用 cmake --install 把 dylib 安装到固定路径，避免在 build 树中搜索
          # INSTALL_PREFIX 下会有 lib/libSDL3.0.dylib 和 lib/libSDL3.dylib（符号链接）
          cmake --install build-ios --prefix staged --config ${{ github.event.inputs.build_type || 'Release' }}
          echo "=== Installed files ==="
          ls -la staged/lib/

      - name: Verify dylib architecture
        run: |
          DYLIB=staged/lib/libSDL3.0.dylib
          if [ ! -f "$DYLIB" ]; then
            echo "ERROR: $DYLIB not found"
            find build-ios -name "*.dylib" -o -name "*.a" 2>/dev/null
            exit 1
          fi
          echo "=== Real library ==="
          file "$DYLIB"
          echo ""
          echo "=== Symbolic link ==="
          ls -la staged/lib/libSDL3.dylib
          readlink staged/lib/libSDL3.dylib
          echo ""
          echo "=== otool -L ==="
          otool -L "$DYLIB" | head -20
          echo ""
          echo "=== LC_ID_DYLIB ==="
          otool -D "$DYLIB"
          echo ""
          echo "=== Exported symbols (sample) ==="
          nm -gU "$DYLIB" 2>/dev/null | grep -E "SDL_SetLogPriorities|SDL_Init|SDL_Quit|SDL_CreateWindow" | head -10

      - name: Sign dylib (ad-hoc for iOS)
        run: |
          codesign --force --sign - staged/lib/libSDL3.0.dylib
          codesign -dvv staged/lib/libSDL3.0.dylib 2>&1 | head -10

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          # 复制真实库文件
          cp staged/lib/libSDL3.0.dylib artifacts/libSDL3.0.dylib
          # 创建符号链接（macOS dylib 标准命名约定）
          # libSDL3.dylib → libSDL3.0.dylib
          # git 会存储为符号链接，checkout 时在 macOS/Linux 上都会还原为符号链接
          cd artifacts
          ln -s libSDL3.0.dylib libSDL3.dylib
          ls -la
          cd ..
          cat > artifacts/BUILD_INFO.txt <<EOF
          SDL3 iOS Build
          ==============
          Build Type: ${{ github.event.inputs.build_type || 'Release' }}
          Architecture: arm64
          Deployment Target: iOS 14.0
          Source Commit: ${{ github.sha }}
          Build Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Files:
            - libSDL3.0.dylib (real library, 2.2MB)
            - libSDL3.dylib (symlink -> libSDL3.0.dylib)
          EOF

      - name: Upload libSDL3.dylib
        uses: actions/upload-artifact@v4
        with:
          name: libSDL3-ios-arm64
          path: artifacts/
          retention-days: 90
